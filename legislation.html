
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Washington Legislation Tracker</title>

<style>
body {
font-family: Arial, sans-serif;
margin: 0;
background: #f4f7fb;
color: #222;
}

header {
background: #1f4d7a;
color: white;
padding: 2rem;
text-align: center;
}

main {
max-width: 1000px;
margin: auto;
padding: 2rem;
}

table {
width: 100%;
border-collapse: collapse;
background: white;
box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

th, td {
padding: 12px;
border-bottom: 1px solid #ddd;
text-align: left;
}

th {
background: #eef2f7;
}

tr:hover {
background: #f5f7fb;
}
</style>
</head>

<body>

<header>
<h1>Washington Legislation Tracker</h1>
</header>

<main>

<table>

<th>Bill</th>

</tr>
</thead>

<tbody>
<tr>

</tr>

<tr>

</html>
