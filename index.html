<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Washington Civic Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

textarea {
  width: 100%;
  height: 200px;
  margin-bottom: 10px;
}

button {
  padding: 10px;
  margin-right: 10px;
  cursor: pointer;
}

.output {
  white-space: pre-wrap;
  background: #fff;
  padding: 15px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>
<div class="container">

<h1>Washington Civic Dashboard</h1>

<!-- SEARCH -->
<h2>Search Catalog</h2>
<input id="searchInput" placeholder="HB 1234 or keyword">
<button id="searchBtn">Search</button>

<div id="results"></div>

<hr>

<!-- TRANSLATOR -->
<h2>Bill Translator</h2>
<textarea id="billText"></textarea>

<br>
<button id="translateBtn">Translate</button>
<button id="loadSampleBtn">Load Sample</button>
<button id="clearBtn">Clear</button>

<div class="output" id="output"></div>

</div>

<script>

let billIndex = [];
let loadedBill = null;

const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");
const resultsDiv = document.getElementById("results");

const billText = document.getElementById("billText");
const translateBtn = document.getElementById("translateBtn");
const loadSampleBtn = document.getElementById("loadSampleBtn");
const clearBtn = document.getElementById("clearBtn");
const output = document.getElementById("output");


// -------------------- LOAD INDEX --------------------
async function loadBillIndex() {
  const res = await fetch("./data/wa/bill-index.json");
  billIndex = await res.json();
  console.log("Index loaded:", billIndex);
}


// -------------------- SEARCH --------------------
function normalize(text) {
  return text.toUpperCase().replace(/[^A-Z0-9]/g, "");
}

searchBtn.addEventListener("click", () => {
  const query = normalize(searchInput.value);

  const matches = billIndex.filter(b =>
    normalize(b.bill_id_normalized).includes(query) ||
    normalize(b.title).includes(query) ||
    (b.aliases || []).some(a => normalize(a).includes(query))
  );

  resultsDiv.innerHTML = "";

  if (matches.length === 0) {
    resultsDiv.innerHTML = "No results";
    return;
  }

  matches.forEach(bill => {
    const btn = document.createElement("button");
    btn.textContent = bill.bill_id_display + " — " + bill.title;

    btn.onclick = () => loadBillDetail(bill.detail_json_path);

    resultsDiv.appendChild(btn);
    resultsDiv.appendChild(document.createElement("br"));
  });
});


// -------------------- LOAD BILL --------------------
async function loadBillDetail(path) {
  const res = await fetch("./" + path);
  loadedBill = await res.json();

  const text = loadedBill.versions[0].sections
    .map(s => `Section ${s.section_number}\n${s.text}`)
    .join("\n\n");

  billText.value = text;

  translate();
}


// -------------------- SAMPLE --------------------
async function loadSample() {
  const res = await fetch("./data/wa/sample-bill.json");
  loadedBill = await res.json();

  const text = loadedBill.versions[0].sections
    .map(s => `Section ${s.section_number}\n${s.text}`)
    .join("\n\n");

  billText.value = text;

  translate();
}


// -------------------- TRANSLATE --------------------
function translate() {
  const text = billText.value;

  if (!text) {
    output.textContent = "No text";
    return;
  }

  const lines = text.split("\n");

  const required = lines.filter(l => /must|shall/i.test(l));
  const allowed = lines.filter(l => /may/i.test(l));
  const prohibited = lines.filter(l => /may not|must not|shall not/i.test(l));
  const timing = lines.filter(l => /within|takes effect|deadline/i.test(l));

  output.textContent =
`Who
• ${required[0] || "None"}

Required
${required.map(l => "• " + l).join("\n") || "• None"}

Allowed
${allowed.map(l => "• " + l).join("\n") || "• None"}

Prohibited
${prohibited.map(l => "• " + l).join("\n") || "• None"}

Timing
${timing.map(l => "• " + l).join("\n") || "• None"}
`;
}


// -------------------- EVENTS --------------------
translateBtn.onclick = translate;
loadSampleBtn.onclick = loadSample;

clearBtn.onclick = () => {
  billText.value = "";
  output.textContent = "";
  resultsDiv.innerHTML = "";
};


// -------------------- INIT --------------------
loadBillIndex();
loadSample();

</script>
</body>
</html>
