<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Washington Civic Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

textarea {
  width: 100%;
  height: 200px;
  margin-bottom: 10px;
}

button {
  padding: 10px;
  margin-right: 10px;
  cursor: pointer;
}

.output {
  white-space: pre-wrap;
  background: #fff;
  padding: 15px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>
<div class="container">

<h1>Washington Civic Dashboard</h1>

<!-- SEARCH -->
<h2>Search Catalog</h2>
<input id="searchInput" placeholder="HB 1234 or keyword">
<button id="searchBtn">Search</button>

<div id="results"></div>

<hr>

<!-- TRANSLATOR -->
<h2>Bill Translator</h2>
<textarea id="billText"></textarea>

<br>
<button id="translateBtn">Translate</button>
<button id="loadSampleBtn">Load Sample</button>
<button id="clearBtn">Clear</button>

<div class="output" id="output"></div>

</div>

<script>
  const howToggle = document.getElementById("howToggle");
  const howBox = document.getElementById("howBox");
  const billNumberInput = document.getElementById("billNumber");
  const openBillPageBtn = document.getElementById("openBillPageBtn");
  const billText = document.getElementById("billText");
  const translateBtn = document.getElementById("translateBtn");
  const loadSampleBtn = document.getElementById("loadSampleBtn");
  const clearBtn = document.getElementById("clearBtn");
  const translationOutput = document.getElementById("translationOutput");
  const anchorList = document.getElementById("anchorList");
  const summaryLink = document.getElementById("summaryLink");
  const searchLink = document.getElementById("searchLink");
  const trackLink = document.getElementById("trackLink");

  let loadedBill = null;
  let billIndex = [];

  function safeSetDefaultOutput() {
    translationOutput.textContent = `Plain-Language Summary
Output will appear here.

Who the rule applies to
• None detected

Required actions
• None detected

Allowed actions
• None detected

Prohibited actions
• None detected

Timing or deadlines
• None detected

Source anchor
• Bill identifier not detected
• Section reference not detected`;

    anchorList.innerHTML = `
      <li>Bill ID anchor: not detected</li>
      <li>Section anchor: not detected</li>
      <li>Clause anchor: not detected</li>
      <li>Source reference: attach official bill page once bill number is known</li>
    `;
  }

  function normalizeQuery(text) {
    return (text || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
  }

  function joinBillSections(bill) {
    if (!bill || !bill.versions || !bill.versions.length) return "";

    const firstVersion = bill.versions[0];
    if (!firstVersion.sections || !firstVersion.sections.length) return "";

    return firstVersion.sections
      .map(section => `Section ${section.section_number}\n${section.text}`)
      .join("\n\n");
  }

  function detectBillId(text, fallbackBillId) {
    const match = text.match(/\b(HB|SB|SHB|SSB|EHB|ESB)\s*\d{3,4}\b/i);
    return match ? match[0].toUpperCase().replace(/\s+/, " ") : (fallbackBillId || "not detected");
  }

  function detectSections(text) {
    const matches = [...text.matchAll(/Section\s+(\d+)/gi)].map(m => `Section ${m[1]}`);
    return matches.length ? [...new Set(matches)] : ["not detected"];
  }

  function splitLines(text) {
    return text
      .split(/[\n.]+/)
      .map(s => s.trim())
      .filter(Boolean);
  }

  function detectRequiredActions(text) {
    return splitLines(text).filter(line => /\b(must|shall|required to)\b/i.test(line));
  }

  function detectAllowedActions(text) {
    return splitLines(text).filter(line => /\b(may|authorized to|permitted to)\b/i.test(line));
  }

  function detectProhibitedActions(text) {
    return splitLines(text).filter(line => /\b(may not|must not|shall not|prohibited)\b/i.test(line));
  }

  function detectTiming(text) {
    return splitLines(text).filter(line =>
      /\b(within\s+\d+\s+days?|by\s+[A-Z][a-z]+\s+\d{1,2},?\s+\d{4}|takes effect|effective date|deadline)\b/i.test(line)
    );
  }

  function detectAppliesTo(text) {
    const hit = splitLines(text).find(line =>
      /\b(a person|department|agency|employer|tenant|landlord|resident|applicant|licensee)\b/i.test(line)
    );
    return hit ? [hit] : ["None detected"];
  }

  function renderTranslation(parsed) {
    translationOutput.textContent = `Plain-Language Summary

Who the rule applies to
${parsed.appliesTo.map(item => `• ${item}`).join("\n")}

Required actions
${parsed.requiredActions.length ? parsed.requiredActions.map(item => `• ${item}`).join("\n") : "• None detected"}

Allowed actions
${parsed.allowedActions.length ? parsed.allowedActions.map(item => `• ${item}`).join("\n") : "• None detected"}

Prohibited actions
${parsed.prohibitedActions.length ? parsed.prohibitedActions.map(item => `• ${item}`).join("\n") : "• None detected"}

Timing or deadlines
${parsed.timing.length ? parsed.timing.map(item => `• ${item}`).join("\n") : "• None detected"}

Source anchor
• Bill identifier: ${parsed.billId}
• Section reference: ${parsed.sections.join(", ")}`;
  }

  function renderAnchors(parsed, sourceUrl) {
    anchorList.innerHTML = `
      <li>Bill ID anchor: ${parsed.billId}</li>
      <li>Section anchor: ${parsed.sections.join(", ")}</li>
      <li>Clause anchor: rule phrases detected from text-level parsing</li>
      <li>Source reference: ${sourceUrl || "not detected"}</li>
    `;
  }

  function parseBillText(text, fallbackBillId, sourceUrl) {
    const parsed = {
      billId: detectBillId(text, fallbackBillId),
      sections: detectSections(text),
      appliesTo: detectAppliesTo(text),
      requiredActions: detectRequiredActions(text),
      allowedActions: detectAllowedActions(text),
      prohibitedActions: detectProhibitedActions(text),
      timing: detectTiming(text)
    };

    renderTranslation(parsed);
    renderAnchors(parsed, sourceUrl);
  }

  async function loadBillIndex() {
    try {
      const response = await fetch("./data/wa/bill-index.json", { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      billIndex = await response.json();
      console.log("Loaded bill index:", billIndex);
    } catch (error) {
      console.error("Error loading bill index:", error);
    }
  }

  async function loadBillDetail(path) {
    try {
      const response = await fetch(`./${path}`, { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      loadedBill = await response.json();

      const text = joinBillSections(loadedBill);
      billText.value = text;

      if (text) {
        parseBillText(
          text,
          loadedBill.bill_id || null,
          loadedBill.source_url || null
        );
      }

      if (loadedBill.bill_id) {
        billNumberInput.value = loadedBill.bill_id;

        const billNumberMatch = loadedBill.bill_id.match(/\d{3,4}/);
        const billNumber = billNumberMatch ? billNumberMatch[0] : loadedBill.bill_id;

        summaryLink.href = `https://app.leg.wa.gov/billsummary/?BillNumber=${encodeURIComponent(billNumber)}&Year=2025`;
        searchLink.href = `https://search.leg.wa.gov/search?query=${encodeURIComponent(loadedBill.bill_id)}`;
      }

      console.log("Loaded bill detail:", loadedBill);
    } catch (error) {
      console.error("Error loading bill detail:", error);
      translationOutput.textContent = "Could not load selected bill detail JSON.";
    }
  }

  async function loadSampleBill() {
    try {
      const response = await fetch("./data/wa/sample-bill.json", { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      loadedBill = await response.json();

      const text = joinBillSections(loadedBill);
      billText.value = text;

      if (text) {
        parseBillText(
          text,
          loadedBill.bill_id || null,
          loadedBill.source_url || null
        );
      }

      if (loadedBill.bill_id) {
        billNumberInput.value = loadedBill.bill_id;

        const billNumberMatch = loadedBill.bill_id.match(/\d{3,4}/);
        const billNumber = billNumberMatch ? billNumberMatch[0] : loadedBill.bill_id;

        summaryLink.href = `https://app.leg.wa.gov/billsummary/?BillNumber=${encodeURIComponent(billNumber)}&Year=2025`;
        searchLink.href = `https://search.leg.wa.gov/search?query=${encodeURIComponent(loadedBill.bill_id)}`;
      }

      console.log("Loaded sample bill:", loadedBill);
    } catch (error) {
      console.error("Error loading sample bill:", error);
      translationOutput.textContent = "Could not load sample bill JSON.";
    }
  }

  howToggle.addEventListener("click", () => {
    howBox.classList.toggle("open");
  });

  openBillPageBtn.addEventListener("click", () => {
    const query = billNumberInput.value.trim();

    if (!query) {
      console.log("No query entered");
      return;
    }

    const normalizedQuery = normalizeQuery(query);

    const match = billIndex.find(bill =>
      normalizeQuery(bill.bill_id_normalized) === normalizedQuery ||
      normalizeQuery(bill.bill_number) === normalizedQuery ||
      normalizeQuery(bill.bill_id_display) === normalizedQuery ||
      (bill.aliases || []).some(alias => normalizeQuery(alias) === normalizedQuery)
    );

    if (!match) {
      console.log("No local match found");
      return;
    }

    loadBillDetail(match.detail_json_path);
  });

  translateBtn.addEventListener("click", () => {
    const text = billText.value.trim();

    if (!text) {
      translationOutput.textContent = "Paste bill text or load a bill first.";
      return;
    }

    parseBillText(
      text,
      loadedBill ? loadedBill.bill_id : null,
      loadedBill ? loadedBill.source_url : null
    );
  });

  clearBtn.addEventListener("click", () => {
    billText.value = "";
    billNumberInput.value = "";
    loadedBill = null;
    safeSetDefaultOutput();
    summaryLink.href = "https://app.leg.wa.gov/billsummary/";
    searchLink.href = "https://leg.wa.gov/bills-meetings-and-session/bills/";
    trackLink.href = "https://leg.wa.gov/bills-meetings-and-session/bills/how-to-track-a-bill/";
  });

  loadSampleBtn.addEventListener("click", () => {
    loadSampleBill();
  });

  safeSetDefaultOutput();
  loadBillIndex();
  loadSampleBill();
</script>
</body>
</html>
