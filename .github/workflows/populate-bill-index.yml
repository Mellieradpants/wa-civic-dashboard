name: Populate Bill Index

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  populate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - run: node scripts/populate-bill-index.js

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wa/bill-index.json
          git diff --staged --quiet || git commit -m "Populate bill index from WA Legislature 2025-26 session"
          git pull --rebase origin main
          git push
