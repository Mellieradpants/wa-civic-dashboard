name: Temporary - demonstrative-that fix comparison

on:
  push:
    paths:
      - '.github/workflows/debug-demonstrative-fix-comparison.yml'

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download bill corpus
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_IDS=$(gh run list --workflow=build-bill-corpus.yml --status=success --limit=10 --json databaseId --jq '.[].databaseId')
          FOUND=0
          for RUN_ID in $RUN_IDS; do
            if gh run download "$RUN_ID" --dir data/wa --pattern 'bill-corpus-*' 2>/dev/null; then
              CORPUS_DIR=$(find data/wa -maxdepth 1 -type d -name 'bill-corpus-*' | head -1)
              if [ -n "$CORPUS_DIR" ] && [ -f "$CORPUS_DIR/bill-corpus.json" ]; then
                mv "$CORPUS_DIR/bill-corpus.json" data/wa/bill-corpus.json
                rm -rf "$CORPUS_DIR"
                echo "Using bill corpus from run $RUN_ID"
                FOUND=1
                break
              fi
            fi
          done
          if [ "$FOUND" = "0" ]; then
            echo "No bill corpus artifact found — cannot run a real corpus-wide comparison"
            exit 1
          fi

      - name: Run comparison
        run: node scripts/_debug-demonstrative-fix-comparison.js

      - name: Commit full report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/_debug-demonstrative-fix-report.txt
          git diff --staged --quiet || git commit -m "Temporary: demonstrative-that fix comparison report"
          git pull --rebase
          git push origin HEAD
