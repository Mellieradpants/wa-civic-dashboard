name: Tmp Scan Including Lists Wide

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scan for including/excluding list sentences across whole pool
        run: node scripts/tmp-scan-including-lists-wide.js
