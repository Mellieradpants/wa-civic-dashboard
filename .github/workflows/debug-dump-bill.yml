name: Debug Dump Bill Text

on:
  push:
    branches:
      - claude/debug-dump-bill-5890

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node scripts/_debug-dump-bill.js "5890" "2025-26"
