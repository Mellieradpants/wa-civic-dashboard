name: Tmp Validate And Split Rule R2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate round 2 of the candidate and-split rule against real bill sentences
        run: node scripts/tmp-validate-and-split-rule-r2.js

      - name: Commit results file
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tmp-validation-run2-results.txt
          git diff --staged --quiet || git commit -m "Add validation run 2 results for review"
          git pull --rebase
          git push origin HEAD
