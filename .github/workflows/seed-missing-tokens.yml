name: Seed Missing Tokens

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/repo-onboarding-X9I38

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: node scripts/seed-missing-tokens.js
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
