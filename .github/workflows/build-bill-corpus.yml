name: Build Bill Corpus

on:
  workflow_dispatch:

jobs:
  build-corpus:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: node scripts/build-bill-corpus.js

      - name: Commit corpus
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wa/bill-corpus.json
          git diff --staged --quiet || git commit -m "Add bill text corpus — $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
