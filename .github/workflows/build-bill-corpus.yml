name: Build Bill Corpus

on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * *'

jobs:
  build-corpus:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # Not currently used — the corpus file is too large to commit to the
      # repo, so this workflow only uploads it as an artifact. Left in case
      # that changes later.
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - name: Clear old corpus
        run: rm -f data/wa/bill-corpus.json

      - run: node scripts/build-bill-corpus.js

      - name: Upload corpus artifact
        uses: actions/upload-artifact@v4
        with:
          name: bill-corpus-${{ github.run_id }}
          path: data/wa/bill-corpus.json
          retention-days: 90
