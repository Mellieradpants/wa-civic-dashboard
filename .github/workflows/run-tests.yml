name: Run test harness

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Start server
        run: node server.js &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health && break
            if [ "$i" = "30" ]; then
              echo "Server did not start within 30 seconds"
              exit 1
            fi
            sleep 1
          done

      - name: Run test harness
        run: node scripts/test-bills.js
