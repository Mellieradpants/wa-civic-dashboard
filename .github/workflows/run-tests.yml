name: Run test harness

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Start server
        run: node server.js &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health && break
            if [ "$i" = "30" ]; then
              echo "Server did not start within 30 seconds"
              exit 1
            fi
            sleep 1
          done

      - name: Download previous test results
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh run list --workflow=run-tests.yml --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" --name test-results --dir data/wa || echo "No previous artifact found for run $RUN_ID"
          else
            echo "No previous successful run found"
          fi

      - name: Run test harness
        run: node scripts/test-bills.js

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: data/wa/test-results.json
