name: Run test harness

on:
  workflow_dispatch:
    inputs:
      sample_size:
        description: 'Bills to sample this run, in addition to sentinels (e.g. 338 for the validation sample)'
        required: false
        default: '30'

permissions:
  contents: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Start server
        run: node server.js &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health && break
            if [ "$i" = "30" ]; then
              echo "Server did not start within 30 seconds"
              exit 1
            fi
            sleep 1
          done

      - name: Download previous test results
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_IDS=$(gh run list --workflow=run-tests.yml --status=success --limit=20 --json databaseId --jq '.[].databaseId')
          FOUND=0
          for RUN_ID in $RUN_IDS; do
            if gh run download "$RUN_ID" --name test-results --dir data/wa 2>/dev/null; then
              echo "Resumed from run $RUN_ID"
              FOUND=1
              break
            fi
          done
          if [ "$FOUND" = "0" ]; then
            echo "No previous run with a test-results artifact found in the last 20 successful runs"
          fi

      - name: Download bill corpus (if available)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_IDS=$(gh run list --workflow=build-bill-corpus.yml --status=success --limit=10 --json databaseId --jq '.[].databaseId')
          FOUND=0
          for RUN_ID in $RUN_IDS; do
            if gh run download "$RUN_ID" --dir data/wa --pattern 'bill-corpus-*' 2>/dev/null; then
              CORPUS_DIR=$(find data/wa -maxdepth 1 -type d -name 'bill-corpus-*' | head -1)
              if [ -n "$CORPUS_DIR" ] && [ -f "$CORPUS_DIR/bill-corpus.json" ]; then
                mv "$CORPUS_DIR/bill-corpus.json" data/wa/bill-corpus.json
                rm -rf "$CORPUS_DIR"
                echo "Using bill corpus from run $RUN_ID"
                FOUND=1
                break
              fi
            fi
          done
          if [ "$FOUND" = "0" ]; then
            echo "No bill corpus artifact found — test harness will use live fetches"
          fi

      - name: Run test harness
        env:
          TEST_SAMPLE_SIZE: ${{ inputs.sample_size }}
        run: node scripts/test-bills.js

      - name: Commit test results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wa/test-results.json
          git diff --staged --quiet || git commit -m "Update test results from CI run"
          git pull --rebase
          git push origin HEAD

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: data/wa/test-results.json
