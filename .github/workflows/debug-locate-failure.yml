name: Debug Locate Failure Rate

on:
  push:
    branches:
      - claude/debug-locate-failure

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: node scripts/_debug-locate-failure.js 150
