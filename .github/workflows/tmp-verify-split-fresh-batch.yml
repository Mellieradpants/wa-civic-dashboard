name: Tmp Verify Split Fresh Batch

on:
  workflow_dispatch:
    inputs:
      cursor_start:
        description: 'Bill pool index to start sampling from'
        required: false
        default: '600'

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify split against fresh batch
        env:
          SCAN_CURSOR_START: ${{ inputs.cursor_start }}
        run: node scripts/tmp-verify-split-fresh-batch.js
