name: Tmp Scan Multi Duty Separators

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scan real bill sentences for multi-duty separator families
        run: node scripts/tmp-scan-multi-duty-separators.js
