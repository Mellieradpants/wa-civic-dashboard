name: Translate Action Dictionary

on:
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/repo-onboarding-X9I38

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: node scripts/translate-dictionary.js
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          GOOGLE_TRANSLATE_API_KEY: ${{ secrets.GOOGLE_TRANSLATE_API_KEY }}

      - name: Commit updated dictionary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/action-dictionary.json
          git diff --staged --quiet || git commit -m "Auto-populate action dictionary from missing token translations"
          git push
