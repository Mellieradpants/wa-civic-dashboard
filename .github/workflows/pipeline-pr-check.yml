name: Pipeline PR check

on:
  pull_request:
    paths:
      - 'lib/plain-meaning/**'
      - 'scripts/test-bills.js'
      - 'data/wa/test-bills.json'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: node server.js &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health && break
            if [ "$i" = "30" ]; then
              echo "Server did not start within 30 seconds"
              exit 1
            fi
            sleep 1
          done

      - name: Run test harness
        env:
          TEST_SAMPLE_SIZE: '40'
        run: node scripts/test-bills.js

      - name: Fail on check failures introduced by this PR
        run: |
          node -e '
            const fs = require("fs");
            const data = JSON.parse(fs.readFileSync("data/wa/test-results.json", "utf8"));
            const thisRun = data.runs[data.runs.length - 1];
            const priorRun = data.runs[data.runs.length - 2];

            const priorFailed = new Set();
            if (priorRun) {
              for (const bill of priorRun.bills) {
                for (const [check, result] of Object.entries(bill.results)) {
                  if (!result.pass) priorFailed.add(`${bill.billNumber}:${check}`);
                }
              }
            }

            const newFailures = [];
            const preExisting = [];
            for (const bill of thisRun.bills) {
              for (const [check, result] of Object.entries(bill.results)) {
                if (!result.pass) {
                  const line = `bill ${bill.billNumber} ${check}: ${result.reason || "failed"}`;
                  (priorFailed.has(`${bill.billNumber}:${check}`) ? preExisting : newFailures).push(line);
                }
              }
            }

            if (preExisting.length) {
              console.log("Pre-existing failures (already failing before this PR, not blocking):");
              for (const f of preExisting) console.log("  " + f);
            }
            if (newFailures.length) {
              console.error("New check failures introduced by this PR:");
              for (const f of newFailures) console.error("  " + f);
              process.exit(1);
            }
            console.log("No new check failures — " + thisRun.bills.length + " bills checked.");
          '
