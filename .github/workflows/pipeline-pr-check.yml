name: Pipeline PR check

on:
  pull_request:
    paths:
      - 'lib/plain-meaning/**'
      - 'scripts/test-bills.js'
      - 'data/wa/test-bills.json'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: node server.js &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health && break
            if [ "$i" = "30" ]; then
              echo "Server did not start within 30 seconds"
              exit 1
            fi
            sleep 1
          done

      - name: Run test harness
        env:
          TEST_SAMPLE_SIZE: '40'
        run: node scripts/test-bills.js

      - name: Fail on check failures introduced by this PR
        run: |
          node -e '
            const fs = require("fs");
            const data = JSON.parse(fs.readFileSync("data/wa/test-results.json", "utf8"));
            const thisRun = data.runs[data.runs.length - 1];
            const priorRuns = data.runs.slice(0, data.runs.length - 1);

            // For each bill+check, the baseline is whichever run most recently
            // actually sampled that bill — not just the single run immediately
            // before this one (which may have sampled a different random 40
            // bills and missed this one entirely), and not the full history
            // either (which would let an old, already-fixed failure excuse a
            // genuine new regression that happens to share a bill number).
            // Scanning newest-to-oldest and keeping only the first match per
            // key gives the most recent result, whether pass or fail.
            const mostRecentPriorResult = new Map();
            for (let i = priorRuns.length - 1; i >= 0; i--) {
              for (const bill of priorRuns[i].bills) {
                for (const [check, result] of Object.entries(bill.results)) {
                  const key = `${bill.billNumber}:${check}`;
                  if (!mostRecentPriorResult.has(key)) mostRecentPriorResult.set(key, result.pass);
                }
              }
            }

            const newFailures = [];
            const preExisting = [];
            for (const bill of thisRun.bills) {
              for (const [check, result] of Object.entries(bill.results)) {
                if (!result.pass) {
                  const key = `${bill.billNumber}:${check}`;
                  const line = `bill ${bill.billNumber} ${check}: ${result.reason || "failed"}`;
                  // Only a confirmed prior failure for this exact bill+check
                  // excuses it. No prior sample at all (undefined) or a prior
                  // pass both count as new, so a real regression can never
                  // hide behind "this bill was never checked before."
                  (mostRecentPriorResult.get(key) === false ? preExisting : newFailures).push(line);
                }
              }
            }

            if (preExisting.length) {
              console.log("Pre-existing failures (already failing the last time this bill+check was sampled, not blocking):");
              for (const f of preExisting) console.log("  " + f);
            }
            if (newFailures.length) {
              console.error("New check failures introduced by this PR:");
              for (const f of newFailures) console.error("  " + f);
              process.exit(1);
            }
            console.log("No new check failures — " + thisRun.bills.length + " bills checked.");
          '
