name: Pipeline PR check

on:
  pull_request:
    paths:
      - 'lib/plain-meaning/**'
      - 'scripts/test-bills.js'
      - 'data/wa/test-bills.json'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: node server.js &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health && break
            if [ "$i" = "30" ]; then
              echo "Server did not start within 30 seconds"
              exit 1
            fi
            sleep 1
          done

      - name: Run test harness
        env:
          TEST_SAMPLE_SIZE: '40'
        run: node scripts/test-bills.js

      - name: Fail on any unresolved check failure
        run: |
          node -e '
            const fs = require("fs");
            const data = JSON.parse(fs.readFileSync("data/wa/test-results.json", "utf8"));
            const run = data.runs[data.runs.length - 1];
            const failures = [];
            for (const bill of run.bills) {
              for (const [check, result] of Object.entries(bill.results)) {
                if (!result.pass) failures.push(`bill ${bill.billNumber} ${check}: ${result.reason || "failed"}`);
              }
            }
            if (failures.length) {
              console.error("Real check failures:");
              for (const f of failures) console.error("  " + f);
              process.exit(1);
            }
            console.log("No real check failures — " + run.bills.length + " bills checked.");
          '
