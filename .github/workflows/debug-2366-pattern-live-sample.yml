name: Temporary - 20-bill live sample for the may/relative-clause/shall pattern

on:
  workflow_dispatch:

jobs:
  sample:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run live sample against production
        run: node scripts/_debug-2366-pattern-live-sample.js
